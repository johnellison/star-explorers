<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Explorers</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="starfield"></div>
    <div id="particles"></div>

    <header id="status-bar">
        <div class="status-left">
            <span class="logo">STAR EXPLORERS</span>
            <span id="session-info" class="status-item"></span>
        </div>
        <div class="status-right">
            <span id="score-display" class="status-item"></span>
            <span id="timer-display" class="status-item"></span>
        </div>
    </header>

    <main id="content"></main>

    <footer id="controls">
        <div id="controls-bar"></div>
    </footer>

    <div id="achievement-overlay" class="hidden"></div>

    <script src="/static/app.js"></script>
</body>
</html>
