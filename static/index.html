<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Explorers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link id="app-stylesheet" rel="stylesheet">
</head>
<body>
    <div id="starfield"></div>
    <div id="particles"></div>

    <header id="status-bar">
        <div class="status-left">
            <span class="logo">STAR EXPLORERS</span>
            <span id="session-info" class="status-item"></span>
        </div>
        <div class="status-right">
            <span id="score-display" class="status-item"></span>
            <span id="timer-display" class="status-item"></span>
        </div>
    </header>

    <main id="content"></main>

    <footer id="controls">
        <div id="controls-bar"></div>
    </footer>

    <div id="achievement-overlay" class="hidden"></div>

    <script>
        const isPagesHost = window.location.hostname.endsWith('github.io');
        const assetBase = isPagesHost ? '.' : '/static';
        document.getElementById('app-stylesheet').href = `${assetBase}/style.css`;

        const appScript = document.createElement('script');
        appScript.src = `${assetBase}/app.js`;
        document.body.appendChild(appScript);
    </script>
</body>
</html>
